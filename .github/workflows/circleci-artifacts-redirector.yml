name: Run CircleCI artifacts redirector for rendered HTML
on: [status]

permissions: read-all

jobs:
  circleci_artifacts_redirector_job:
    if: ${{ (github.repository == 'astropy/astropy-sphinx-theme') && startswith(github.event.context, 'ci/circleci') }}
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    name: Run CircleCI artifacts redirector
    steps:
      - name: GitHub Action step
        uses: scientific-python/circleci-artifacts-redirector-action@5d358ff96e96429a5c64a969bb4a574555439f4f # v1.3.1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          api-token: ${{ secrets.ASTROPY_SPHINX_CIRCLE_TOKEN }} # zizmor: ignore[secrets-outside-env]
          artifact-path: 0/build_preview/_build/html/index.html
          circleci-jobs: website,theme,theme-bootstrap,theme-devdeps,astropy
          job-title: "--> Rendering Preview <--"
